name: GitHub Epic Code Reviewer
description: Self-hostable epic code reviewer for GitHub Actions.
author: hongkongkiwi

inputs:
  provider:
    description: "Model provider: openai-compatible or anthropic."
    required: false
    default: openai-compatible
  model:
    description: Model name passed to the provider.
    required: false
    default: gpt-4.1-mini
  fallback-provider:
    description: Optional fallback provider when the primary model request fails.
    required: false
    default: ""
  fallback-model:
    description: Optional fallback model name.
    required: false
    default: ""
  config-path:
    description: Optional JSON config path in the checked-out repository.
    required: false
    default: epic-code-reviewer.config.json
  max-files:
    description: Maximum changed files to include.
    required: false
    default: "60"
  max-diff-chars:
    description: Maximum diff characters sent to the model.
    required: false
    default: "120000"
  post-mode:
    description: "comment, review, or both."
    required: false
    default: both
  min-confidence:
    description: Minimum confidence from 0.0 to 1.0 for inline findings.
    required: false
    default: "0.72"
  fail-on-block:
    description: Fail the workflow when a block severity finding is returned.
    required: false
    default: "false"
  dry-run:
    description: Write JSON and job summary without posting comments.
    required: false
    default: "false"
  context-lines:
    description: Nearby source lines to collect around each changed hunk.
    required: false
    default: "80"
  max-context-chars:
    description: Maximum extra context characters sent to the model.
    required: false
    default: "60000"
  judge-enabled:
    description: Run a second model pass that rejects weak findings.
    required: false
    default: "true"
  dedupe-comments:
    description: Avoid reposting findings already left by this action.
    required: false
    default: "true"
  check-run-enabled:
    description: Write a neutral check run with severity counts.
    required: false
    default: "true"
  symbol-context:
    description: Include simple symbol matches from changed files.
    required: false
    default: "true"
  patch-artifact-path:
    description: Path written by @epic-reviewer fix.
    required: false
    default: epic-code-reviewer-suggested.patch
  auto-review-enabled:
    description: Review pull_request events automatically. Comment commands still work when false.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Run GitHub Epic Code Reviewer
      shell: bash
      env:
        REVIEWER_PROVIDER: ${{ inputs.provider }}
        REVIEWER_MODEL: ${{ inputs.model }}
        REVIEWER_FALLBACK_PROVIDER: ${{ inputs.fallback-provider }}
        REVIEWER_FALLBACK_MODEL: ${{ inputs.fallback-model }}
        REVIEWER_CONFIG_PATH: ${{ inputs.config-path }}
        REVIEWER_MAX_FILES: ${{ inputs.max-files }}
        REVIEWER_MAX_DIFF_CHARS: ${{ inputs.max-diff-chars }}
        REVIEWER_POST_MODE: ${{ inputs.post-mode }}
        REVIEWER_MIN_CONFIDENCE: ${{ inputs.min-confidence }}
        REVIEWER_FAIL_ON_BLOCK: ${{ inputs.fail-on-block }}
        REVIEWER_DRY_RUN: ${{ inputs.dry-run }}
        REVIEWER_CONTEXT_LINES: ${{ inputs.context-lines }}
        REVIEWER_MAX_CONTEXT_CHARS: ${{ inputs.max-context-chars }}
        REVIEWER_JUDGE_ENABLED: ${{ inputs.judge-enabled }}
        REVIEWER_DEDUPE_COMMENTS: ${{ inputs.dedupe-comments }}
        REVIEWER_CHECK_RUN_ENABLED: ${{ inputs.check-run-enabled }}
        REVIEWER_SYMBOL_CONTEXT: ${{ inputs.symbol-context }}
        REVIEWER_PATCH_ARTIFACT_PATH: ${{ inputs.patch-artifact-path }}
        REVIEWER_AUTO_REVIEW_ENABLED: ${{ inputs.auto-review-enabled }}
      run: python3 "$GITHUB_ACTION_PATH/scripts/review_pr.py"
