name: Self Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: self-review-${{ github.event.comment.id }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
      pr_number: ${{ steps.check.outputs.pr_number }}
    steps:
      - name: Check PR safety
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const repo = context.repo;
            const sameRepoName = `${repo.owner}/${repo.repo}`;
            let allowed = false;
            let prNumber = "";
            let headRepo = "";

            if (context.eventName === "issue_comment") {
              const issue = context.payload.issue;
              const comment = context.payload.comment;
              const body = (comment.body || "").trim().toLowerCase();
              const trusted = ["OWNER", "MEMBER", "COLLABORATOR"].includes(comment.author_association);
              const command = ["@epic-reviewer"].some((prefix) => body === prefix || body.startsWith(`${prefix} `));
              if (trusted && command) {
                try {
                  const pull = await github.rest.pulls.get({
                    owner: repo.owner,
                    repo: repo.repo,
                    pull_number: issue.number,
                  });
                  prNumber = String(issue.number);
                  headRepo = pull.data.head?.repo?.full_name || "";
                  allowed = headRepo === sameRepoName;
                } catch (error) {
                  core.info(`comment did not resolve to a pull request: ${error.message}`);
                }
              }
            }

            core.info(`head_repo == repo: ${headRepo === sameRepoName}`);
            core.setOutput("allowed", String(allowed));
            core.setOutput("pr_number", prNumber);

  review:
    needs: preflight
    if: needs.preflight.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      checks: write
    env:
      HAS_REVIEWER_MODEL_API_KEY: ${{ ((vars.REVIEWER_PROVIDER == '' || vars.REVIEWER_PROVIDER == 'openai' || vars.REVIEWER_PROVIDER == 'openai-compatible') && secrets.REVIEWER_OPENAI_API_KEY != '') || (vars.REVIEWER_PROVIDER == 'openrouter' && secrets.REVIEWER_OPENROUTER_API_KEY != '') || (vars.REVIEWER_PROVIDER == 'anthropic' && secrets.REVIEWER_ANTHROPIC_API_KEY != '') }}
    steps:
      - name: Check out pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/pull/${{ needs.preflight.outputs.pr_number }}/merge

      - name: Review pull request
        if: env.HAS_REVIEWER_MODEL_API_KEY == 'true'
        uses: hongkongkiwi/github-epic-code-reviewer@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEWER_OPENAI_API_KEY: ${{ secrets.REVIEWER_OPENAI_API_KEY }}
          REVIEWER_OPENAI_BASE_URL: ${{ secrets.REVIEWER_OPENAI_BASE_URL }}
          REVIEWER_OPENROUTER_API_KEY: ${{ secrets.REVIEWER_OPENROUTER_API_KEY }}
          REVIEWER_OPENROUTER_SITE_URL: ${{ vars.REVIEWER_OPENROUTER_SITE_URL }}
          REVIEWER_OPENROUTER_APP_NAME: GitHub Epic Code Reviewer
          REVIEWER_ANTHROPIC_API_KEY: ${{ secrets.REVIEWER_ANTHROPIC_API_KEY }}
        with:
          provider: ${{ vars.REVIEWER_PROVIDER || 'openai' }}
          model: ${{ vars.REVIEWER_MODEL || 'gpt-4.1-mini' }}
          config-path: epic-code-reviewer.config.json
          post-mode: both
          min-confidence: "0.72"
          judge-enabled: "true"
          dedupe-comments: "true"

      - name: Skip without model secret
        if: env.HAS_REVIEWER_MODEL_API_KEY != 'true'
        run: echo "Skipping self-review because no reviewer model API secret is configured."

      - name: Upload suggested patch
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epic-code-reviewer-suggested-patch
          path: epic-code-reviewer-suggested.patch
          if-no-files-found: ignore

      - name: Upload task memory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epic-code-reviewer-task-memory
          path: .github/epic-code-reviewer-task-memory.md
          if-no-files-found: ignore

      - name: Upload command audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epic-code-reviewer-command-audit
          path: .github/epic-code-reviewer-command-audit.jsonl
          if-no-files-found: ignore
