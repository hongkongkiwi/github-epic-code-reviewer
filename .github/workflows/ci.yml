name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compile reviewer script
        run: python3 -m py_compile scripts/review_pr.py

      - name: Run tests
        run: python3 -m unittest discover -s tests
